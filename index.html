<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Metro Beat</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- ── View: Metronome ── -->
<div class="view active" id="viewMetronome">

  <!-- A: Fixed top area -->
  <div class="metro-top">
    <h1>Metro<span>Beat</span></h1>
    <div class="beat-header-row">
      <button class="settings-btn" id="settingsBtnMetro" type="button" aria-label="設定">⚙️</button>
      <div class="beat-row" id="beatRow"></div>
      <button class="mute-btn" id="muteBtnMetro" type="button" aria-label="ミュート切替">🔊</button>
    </div>
    <div class="bpm-block">
      <div class="bpm-label">BPM</div>
      <div class="bpm-value" id="bpmDisplay">120</div>
      <input type="range" class="bpm-slider" id="bpmSlider"
             min="20" max="300" value="120" step="1">
      <div class="bpm-btns">
        <button id="bpmMinus10">-10</button>
        <button id="bpmMinus5">-5</button>
        <button id="bpmMinus1">-1</button>
        <button id="bpmPlus1">+1</button>
        <button id="bpmPlus5">+5</button>
        <button id="bpmPlus10">+10</button>
      </div>
    </div>
  </div>

  <!-- B: Swipe center area (3 pages) -->
  <div class="swipe-wrap">
    <div class="swipe-pages" id="swipePages">

      <!-- Page 0: Ball Animation -->
      <div class="swipe-page" id="spBall">
        <div class="swipe-page-title" data-i18n="page.ball">ボール</div>
        <canvas id="ballCanvas" class="ball-canvas"></canvas>
      </div>

      <!-- Page 1: Volume -->
      <div class="swipe-page" id="spVolume">
        <div class="swipe-page-title" data-i18n="page.volume">音量設定</div>
        <div class="vol-section">
          <div class="vol-row master-vol-row">
            <div class="vol-name master-vol-name" data-i18n="volume.master"><b>全体</b></div>
            <input type="range" class="vol-slider master-vol-slider" id="volMaster" min="0" max="100" value="100">
            <input type="number" class="vol-num-input" id="volMasterNum" min="0" max="100" step="1" value="100" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name" data-i18n="volume.beat1"><b>頭拍</b></div>
            <input type="range" class="vol-slider" id="volBeat1" min="0" max="100" value="100">
            <input type="number" class="vol-num-input" id="volBeat1Num" min="0" max="100" step="1" value="100" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name" data-i18n="volume.quarter"><b>4分</b></div>
            <input type="range" class="vol-slider" id="volQuarter" min="0" max="100" value="80">
            <input type="number" class="vol-num-input" id="volQuarterNum" min="0" max="100" step="1" value="80" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name" data-i18n="volume.eighth"><b>8分</b></div>
            <input type="range" class="vol-slider" id="volEighth" min="0" max="100" value="50">
            <input type="number" class="vol-num-input" id="volEighthNum" min="0" max="100" step="1" value="50" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name" data-i18n="volume.sixteenth"><b>16分</b></div>
            <input type="range" class="vol-slider" id="volSixteenth" min="0" max="100" value="0">
            <input type="number" class="vol-num-input" id="volSixteenthNum" min="0" max="100" step="1" value="0" inputmode="numeric">
          </div>
        </div>
      </div>

      <!-- Page 2: Time Signature -->
      <div class="swipe-page" id="spTimeSig">
        <div class="swipe-page-title" data-i18n="page.timesig">拍子</div>
        <div class="ts-picker-wrap">
          <div class="ts-picker-row">
            <div class="ts-picker-col">
              <button class="ts-arrow" id="tsNumUp">▲</button>
              <div class="ts-val" id="tsNumVal">4</div>
              <button class="ts-arrow" id="tsNumDn">▼</button>
            </div>
            <div class="ts-slash">/</div>
            <div class="ts-picker-col">
              <button class="ts-arrow" id="tsDenUp">▲</button>
              <div class="ts-val" id="tsDenVal">4</div>
              <button class="ts-arrow" id="tsDenDn">▼</button>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /swipe-pages -->

    <!-- Page indicator dots -->
    <div class="page-dots">
      <button class="page-dot active" data-page="0"></button>
      <button class="page-dot" data-page="1"></button>
      <button class="page-dot" data-page="2"></button>
    </div>
  </div><!-- /swipe-wrap -->

  <!-- C: Fixed bottom area -->
  <div class="metro-bottom">
    <div class="action-row">
      <button class="btn-play" id="playBtn">▶ START</button>
      <button class="btn-tap" id="tapBtn">TAP<br>TEMPO</button>
    </div>
  </div>

</div><!-- /viewMetronome -->

<!-- ── View: Setlist ── -->
<div class="view" id="viewSetlist">
  <div class="view-top-section">
    <h1 class="view-title">Metro<span>Beat</span></h1>
    <!-- Beat indicator (mirrors metronome tab) -->
    <div class="beat-header-row">
      <button class="settings-btn" id="settingsBtnSetlist" type="button" aria-label="設定">⚙️</button>
      <div class="beat-row sl-beat-row" id="beatRowSetlist"></div>
      <button class="mute-btn" id="muteBtnSetlist" type="button" aria-label="ミュート切替">🔊</button>
    </div>
  </div>

  <div class="view-body">
    <!-- Now Playing banner -->
    <div class="now-playing" id="nowPlaying" style="display:none">
      <span class="np-icon">▶</span>
      <span class="np-name" id="nowPlayingName">—</span>
      <span class="np-bpm" id="nowPlayingBpm">— BPM</span>
    </div>

    <!-- Sub-view A: Setlist Index -->
    <div class="sl-subview active" id="slIndex">
      <section class="setlist-section setlist-full">
        <div class="setlist-header">
          <span class="card-label">♩ SETLISTS</span>
          <button class="btn-sl-add" id="btnAddSetlist" data-i18n="setlist.addSetlist">＋ 新規作成</button>
        </div>
        <div class="setlist-list" id="slIndexList"></div>
        <div class="preset-form" id="slForm" style="display:none">
          <div class="pf-fields">
            <input class="pf-name" type="text" id="slName" placeholder="セットリスト名 (例: ワンマンライブ)" data-i18n-placeholder="setlist.namePlaceholder">
          </div>
          <div class="pf-btns">
            <button class="pf-save"   id="slSave" data-i18n="common.save">保存</button>
            <button class="pf-cancel" id="slCancel" data-i18n="common.cancel">キャンセル</button>
          </div>
        </div>
      </section>
    </div>

    <!-- Sub-view B: Song List -->
    <div class="sl-subview" id="slDetail">
      <div class="sl-detail-header">
        <button class="btn-sl-back" id="btnBack" data-i18n="common.back">← 戻る</button>
        <span class="sl-detail-title" id="slDetailTitle">—</span>
      </div>
      <section class="setlist-section setlist-full">
        <div class="setlist-header">
          <span class="card-label" data-i18n="setlist.songList">♩ 曲リスト</span>
          <button class="btn-sl-add" id="btnAddSong" data-i18n="common.add">＋ 追加</button>
        </div>
        <div class="setlist-list" id="songList"></div>
        <div class="preset-form" id="presetForm" style="display:none">
          <div class="pf-mode-row">
            <div class="toggle-pair">
              <button class="tgl-btn active" id="pfModeLib" data-i18n="setlist.fromLibrary">ライブラリから</button>
              <button class="tgl-btn" id="pfModeManual" data-i18n="setlist.manualInput">直接入力</button>
            </div>
          </div>
          <div id="pfManual">
            <div class="pf-fields">
              <input class="pf-name" type="text" id="pfName" placeholder="曲名" data-i18n-placeholder="library.songName">
              <input class="pf-bpm"  type="number" id="pfBpm"  placeholder="BPM" min="20" max="300">
            </div>
            <div id="pfTsPicker" class="form-ts-picker"></div>
            <button type="button" id="pfCaptureBtn" class="capture-btn" data-i18n="capture.currentSettings">現在のBPM・音量・拍子設定を取り込む</button>
            <div id="pfCapturePreview" class="capture-preview" style="display:none"></div>
            <div class="pf-btns">
              <button class="pf-save"   id="pfSave" data-i18n="common.save">保存</button>
              <button class="pf-cancel" id="pfCancel" data-i18n="common.cancel">キャンセル</button>
            </div>
          </div>
          <div id="pfLibPicker" style="display:none">
            <div class="setlist-list pf-lib-list" id="pfLibList"></div>
            <div class="pf-btns" style="margin-top:8px">
              <button class="pf-cancel" id="pfLibPickerCancel" data-i18n="common.cancel">キャンセル</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

</div><!-- /viewSetlist -->

<!-- ── View: Library ── -->
<div class="view" id="viewLibrary">
  <div class="view-top-section">
    <h1 class="view-title">Metro<span>Beat</span></h1>
    <div class="beat-header-row">
      <button class="settings-btn" id="settingsBtnLibrary" type="button" aria-label="設定">⚙️</button>
      <div class="beat-row sl-beat-row" id="beatRowLibrary"></div>
      <button class="mute-btn" id="muteBtnLibrary" type="button" aria-label="ミュート切替">🔊</button>
    </div>
  </div>
  <div class="view-body">
    <!-- Now Playing banner -->
    <div class="now-playing" id="nowPlayingLib" style="display:none">
      <span class="np-icon">▶</span>
      <span class="np-name">—</span>
      <span class="np-bpm">— BPM</span>
    </div>

    <section class="setlist-section setlist-full">
      <div class="setlist-header">
        <span class="card-label" data-i18n="library.title">♩ 曲ライブラリ</span>
        <button class="btn-sl-add" id="btnAddLibSong" data-i18n="common.add">＋ 追加</button>
      </div>
      <div class="lib-sort-row">
        <span class="toggle-label" data-i18n="library.sort">ソート</span>
        <div class="toggle-pair">
          <button class="tgl-btn active" id="libSortManual" data-i18n="library.sortManual">手動</button>
          <button class="tgl-btn" id="libSortName" data-i18n="library.sortName">曲名</button>
          <button class="tgl-btn" id="libSortBpm" data-i18n="library.sortBpm">BPM</button>
        </div>
      </div>
      <div class="setlist-list" id="libSongList"></div>
      <div class="preset-form" id="libForm" style="display:none">
        <div class="pf-fields">
          <input class="pf-name" type="text"   id="libName" placeholder="曲名" data-i18n-placeholder="library.songName">
          <input class="pf-bpm"  type="number" id="libBpm"  placeholder="BPM" min="20" max="300">
        </div>
        <div id="libTsPicker" class="form-ts-picker"></div>
        <button type="button" id="libCaptureBtn" class="capture-btn" data-i18n="capture.currentSettings">現在のBPM・音量・拍子設定を取り込む</button>
        <div id="libCapturePreview" class="capture-preview" style="display:none"></div>
        <div class="pf-btns">
          <button class="pf-save"   id="libSave" data-i18n="common.save">保存</button>
          <button class="pf-cancel" id="libCancel" data-i18n="common.cancel">キャンセル</button>
        </div>
      </div>
    </section>
  </div>
</div><!-- /viewLibrary -->

<!-- ── Bottom Nav ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navMetronome" data-nav="metronome">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 3 20 21 4 21"/>
      <line x1="12" y1="14" x2="12" y2="21"/>
      <circle cx="12" cy="11" r="2.2" fill="currentColor" stroke="none"/>
    </svg>
    <span class="nav-label">メトロノーム</span>
  </button>
  <button class="nav-btn" id="navSetlist" data-nav="setlist">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="9" y1="6"  x2="20" y2="6"/>
      <line x1="9" y1="12" x2="20" y2="12"/>
      <line x1="9" y1="18" x2="20" y2="18"/>
      <circle cx="5" cy="6"  r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="5" cy="18" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
    <span class="nav-label">セットリスト</span>
  </button>
  <button class="nav-btn" id="navLibrary" data-nav="library">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    <span class="nav-label">ライブラリ</span>
  </button>
</nav>

<!-- Pro ペイウォール -->
<div id="proPaywall" class="modal-overlay" style="display:none" aria-modal="true" role="dialog">
  <div class="modal-card">
    <h2 class="modal-title">Metro Beat Pro</h2>
    <ul class="paywall-list">
      <li data-i18n="paywall.unlimited">✓ セットリスト・ライブラリが無制限に</li>
      <li data-i18n="paywall.volumePreset">✓ 曲ごとの音量プリセット保存</li>
      <li data-i18n="paywall.timeSignature">✓ 曲ごとの拍子記録</li>
      <li data-i18n="paywall.future">✓ 今後追加される Pro 機能すべて</li>
    </ul>
    <button id="paywallBuyBtn" class="btn-primary" data-i18n="paywall.upgrade">Pro にアップグレード（$7.99）</button>
    <button id="paywallRestoreBtn" class="btn-ghost" data-i18n="paywall.restore">購入を復元</button>
    <button id="paywallCloseBtn" class="btn-close" aria-label="閉じる">✕</button>
  </div>
</div>

<!-- ── Settings Modal ── -->
<div class="settings-overlay" id="settingsOverlay" hidden>
  <div class="settings-modal" id="settingsModal" role="dialog" aria-modal="true" aria-label="設定">
    <div class="settings-header">
      <span class="settings-title" data-i18n="settings.title">設定</span>
      <button class="settings-close" id="settingsClose" aria-label="閉じる">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <span class="settings-label" data-i18n="settings.language">言語</span>
        <div class="toggle-pair">
          <button class="tgl-btn active" id="langJa" type="button">日本語</button>
          <button class="tgl-btn" id="langEn" type="button">English</button>
        </div>
      </div>

      <div class="settings-row">
        <span class="settings-label" data-i18n="settings.wakelock">常時画面オン</span>
        <div class="toggle-pair">
          <button class="tgl-btn active" id="wakelockOnBtn" type="button" data-i18n="common.on">ON</button>
          <button class="tgl-btn" id="wakelockOffBtn" type="button" data-i18n="common.off">OFF</button>
        </div>
      </div>

      <div class="settings-section-title" data-i18n="settings.ball">ボール設定</div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="settings.ballDirection">移動方向</span>
        <div class="toggle-pair">
          <button class="tgl-btn active" id="modeVertical" type="button" data-i18n="settings.vertical">縦</button>
          <button class="tgl-btn" id="modeHorizontal" type="button" data-i18n="settings.horizontal">横</button>
        </div>
      </div>

      <div class="settings-row">
        <span class="settings-label" data-i18n="settings.squash">スクワッシュ</span>
        <div class="toggle-pair">
          <button class="tgl-btn active" id="squashOnBtn" type="button" data-i18n="common.on">ON</button>
          <button class="tgl-btn" id="squashOffBtn" type="button" data-i18n="common.off">OFF</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>

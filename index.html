<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Beat</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- ── View: Metronome ── -->
<div class="view active" id="viewMetronome">

  <!-- A: Fixed top area -->
  <div class="metro-top">
    <h1>Metro<span>Beat</span></h1>
    <div class="beat-row" id="beatRow"></div>
    <div class="bpm-block">
      <div class="bpm-label">BPM</div>
      <div class="bpm-value" id="bpmDisplay">120</div>
      <input type="range" class="bpm-slider" id="bpmSlider"
             min="20" max="300" value="120" step="1">
      <div class="bpm-btns">
        <button id="bpmMinus10">-10</button>
        <button id="bpmMinus1">-1</button>
        <button id="bpmPlus1">+1</button>
        <button id="bpmPlus10">+10</button>
      </div>
    </div>
  </div>

  <!-- B: Swipe center area (3 pages) -->
  <div class="swipe-wrap">
    <div class="swipe-pages" id="swipePages">

      <!-- Page 0: Ball Animation -->
      <div class="swipe-page" id="spBall">
        <div class="swipe-page-title">ボール</div>
        <canvas id="ballCanvas" class="ball-canvas"></canvas>
        <div class="ball-controls">
          <div class="toggle-row ball-toggle-row">
            <div class="ball-toggle-group">
              <span class="toggle-label">移動方向</span>
              <div class="toggle-pair">
                <button class="tgl-btn active" id="modeVertical">縦</button>
                <button class="tgl-btn" id="modeHorizontal">横</button>
              </div>
            </div>
            <div class="ball-toggle-group">
              <span class="toggle-label">スクワッシュ</span>
              <div class="toggle-pair">
                <button class="tgl-btn active" id="squashOnBtn">ON</button>
                <button class="tgl-btn" id="squashOffBtn">OFF</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Page 1: Volume -->
      <div class="swipe-page" id="spVolume">
        <div class="swipe-page-title">音量調整</div>
        <div class="vol-section">
          <div class="vol-row master-vol-row">
            <div class="vol-name master-vol-name"><b>全体</b></div>
            <input type="range" class="vol-slider master-vol-slider" id="volMaster" min="0" max="100" value="100">
            <input type="number" class="vol-num-input" id="volMasterNum" min="0" max="100" step="1" value="100" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name"><b>頭拍</b></div>
            <input type="range" class="vol-slider" id="volBeat1" min="0" max="100" value="100">
            <input type="number" class="vol-num-input" id="volBeat1Num" min="0" max="100" step="1" value="100" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name"><b>4分</b></div>
            <input type="range" class="vol-slider" id="volQuarter" min="0" max="100" value="80">
            <input type="number" class="vol-num-input" id="volQuarterNum" min="0" max="100" step="1" value="80" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name"><b>8分</b></div>
            <input type="range" class="vol-slider" id="volEighth" min="0" max="100" value="50">
            <input type="number" class="vol-num-input" id="volEighthNum" min="0" max="100" step="1" value="50" inputmode="numeric">
          </div>
          <div class="vol-row">
            <div class="vol-name"><b>16分</b></div>
            <input type="range" class="vol-slider" id="volSixteenth" min="0" max="100" value="0">
            <input type="number" class="vol-num-input" id="volSixteenthNum" min="0" max="100" step="1" value="0" inputmode="numeric">
          </div>
        </div>
      </div>

      <!-- Page 2: Time Signature -->
      <div class="swipe-page" id="spTimeSig">
        <div class="swipe-page-title">拍子</div>
        <div class="ts-picker-wrap">
          <div class="ts-picker-row">
            <div class="ts-picker-col">
              <button class="ts-arrow" id="tsNumUp">▲</button>
              <div class="ts-val" id="tsNumVal">4</div>
              <button class="ts-arrow" id="tsNumDn">▼</button>
            </div>
            <div class="ts-slash">/</div>
            <div class="ts-picker-col">
              <button class="ts-arrow" id="tsDenUp">▲</button>
              <div class="ts-val" id="tsDenVal">4</div>
              <button class="ts-arrow" id="tsDenDn">▼</button>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /swipe-pages -->

    <!-- Page indicator dots -->
    <div class="page-dots">
      <button class="page-dot active" data-page="0"></button>
      <button class="page-dot" data-page="1"></button>
      <button class="page-dot" data-page="2"></button>
    </div>
  </div><!-- /swipe-wrap -->

  <!-- C: Fixed bottom area -->
  <div class="metro-bottom">
    <div class="action-row">
      <button class="btn-play" id="playBtn">▶ START</button>
      <button class="btn-tap" id="tapBtn">TAP<br>TEMPO</button>
    </div>
  </div>

</div><!-- /viewMetronome -->

<!-- ── View: Setlist ── -->
<div class="view" id="viewSetlist">
  <div class="view-top-section">
    <h1 class="view-title">Metro<span>Beat</span></h1>
    <!-- Beat indicator (mirrors metronome tab) -->
    <div class="beat-row sl-beat-row" id="beatRowSetlist"></div>
  </div>

  <div class="view-body">
    <!-- Now Playing banner -->
    <div class="now-playing" id="nowPlaying" style="display:none">
      <span class="np-icon">▶</span>
      <span class="np-name" id="nowPlayingName">—</span>
      <span class="np-bpm" id="nowPlayingBpm">— BPM</span>
    </div>

    <!-- Sub-view A: Setlist Index -->
    <div class="sl-subview active" id="slIndex">
      <section class="setlist-section setlist-full">
        <div class="setlist-header">
          <span class="card-label">♩ SETLISTS</span>
          <button class="btn-sl-add" id="btnAddSetlist">＋ 新規作成</button>
        </div>
        <div class="setlist-list" id="slIndexList"></div>
        <div class="preset-form" id="slForm" style="display:none">
          <div class="pf-fields">
            <input class="pf-name" type="text" id="slName" placeholder="セットリスト名 (例: ワンマンライブ)">
          </div>
          <div class="pf-btns">
            <button class="pf-save"   id="slSave">保存</button>
            <button class="pf-cancel" id="slCancel">キャンセル</button>
          </div>
        </div>
      </section>
    </div>

    <!-- Sub-view B: Song List -->
    <div class="sl-subview" id="slDetail">
      <div class="sl-detail-header">
        <button class="btn-sl-back" id="btnBack">← 戻る</button>
        <span class="sl-detail-title" id="slDetailTitle">—</span>
      </div>
      <section class="setlist-section setlist-full">
        <div class="setlist-header">
          <span class="card-label">♩ 曲リスト</span>
          <button class="btn-sl-add" id="btnAddSong">＋ 追加</button>
        </div>
        <div class="setlist-list" id="songList"></div>
        <div class="preset-form" id="presetForm" style="display:none">
          <div class="pf-mode-row">
            <div class="toggle-pair">
              <button class="tgl-btn active" id="pfModeManual">直接入力</button>
              <button class="tgl-btn" id="pfModeLib">ライブラリから</button>
            </div>
          </div>
          <div id="pfManual">
            <div class="pf-fields">
              <input class="pf-name" type="text" id="pfName" placeholder="曲名">
              <input class="pf-bpm"  type="number" id="pfBpm"  placeholder="BPM" min="20" max="300">
            </div>
            <div class="pf-btns">
              <button class="pf-save"   id="pfSave">保存</button>
              <button class="pf-cancel" id="pfCancel">キャンセル</button>
            </div>
          </div>
          <div id="pfLibPicker" style="display:none">
            <div class="setlist-list pf-lib-list" id="pfLibList"></div>
            <div class="pf-btns" style="margin-top:8px">
              <button class="pf-cancel" id="pfLibPickerCancel">キャンセル</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

</div><!-- /viewSetlist -->

<!-- ── View: Library ── -->
<div class="view" id="viewLibrary">
  <div class="view-top-section">
    <h1 class="view-title">Metro<span>Beat</span></h1>
    <div class="beat-row sl-beat-row" id="beatRowLibrary"></div>
  </div>
  <div class="view-body">
    <!-- Now Playing banner -->
    <div class="now-playing" id="nowPlayingLib" style="display:none">
      <span class="np-icon">▶</span>
      <span class="np-name">—</span>
      <span class="np-bpm">— BPM</span>
    </div>

    <section class="setlist-section setlist-full">
      <div class="setlist-header">
        <span class="card-label">♩ 曲ライブラリ</span>
        <button class="btn-sl-add" id="btnAddLibSong">＋ 追加</button>
      </div>
      <div class="lib-sort-row">
        <span class="toggle-label">ソート</span>
        <div class="toggle-pair">
          <button class="tgl-btn active" id="libSortManual">手動</button>
          <button class="tgl-btn" id="libSortName">曲名</button>
          <button class="tgl-btn" id="libSortBpm">BPM</button>
        </div>
      </div>
      <div class="setlist-list" id="libSongList"></div>
      <div class="preset-form" id="libForm" style="display:none">
        <div class="pf-fields">
          <input class="pf-name" type="text"   id="libName" placeholder="曲名">
          <input class="pf-bpm"  type="number" id="libBpm"  placeholder="BPM" min="20" max="300">
        </div>
        <div class="pf-btns">
          <button class="pf-save"   id="libSave">保存</button>
          <button class="pf-cancel" id="libCancel">キャンセル</button>
        </div>
      </div>
    </section>
  </div>
</div><!-- /viewLibrary -->

<!-- ── Bottom Nav ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navMetronome">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 3 20 21 4 21"/>
      <line x1="12" y1="14" x2="12" y2="21"/>
      <circle cx="12" cy="11" r="2.2" fill="currentColor" stroke="none"/>
    </svg>
    <span class="nav-label">メトロノーム</span>
  </button>
  <button class="nav-btn" id="navSetlist">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="9" y1="6"  x2="20" y2="6"/>
      <line x1="9" y1="12" x2="20" y2="12"/>
      <line x1="9" y1="18" x2="20" y2="18"/>
      <circle cx="5" cy="6"  r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="5" cy="18" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
    <span class="nav-label">セットリスト</span>
  </button>
  <button class="nav-btn" id="navLibrary">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    <span class="nav-label">ライブラリ</span>
  </button>
</nav>

<script type="module" src="/src/main.js"></script>
</body>
</html>
